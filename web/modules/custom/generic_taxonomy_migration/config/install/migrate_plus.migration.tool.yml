id: tool
label: 'Content: Tool'

source:
  plugin: tool_sql
  key: cherity

process:
  type:
    plugin: default_value
    default_value: tool

  title: title
  uid:
    plugin: migration_lookup
    migration: civicrm_user_migration
    source: uid
    no_stub: true

  body/value: body
  body/format:
    plugin: default_value
    default_value: basic_html

  field_link/uri: link

  created: created
  changed: changed

  # Featured image
  field_image/target_id:
    plugin: migration_lookup
    migration: ffeatured_imagess
    source: image_fid

  # Supporting document
  field_supporting_documents2/target_id:
    plugin: migration_lookup
    migration: featured_images
    source: doc_fid

  # Organization reference
  field_organization:
    plugin: migration_lookup
    migration: civicrm_organization
    source: organization_nid

  # Keywords taxonomy
  field_keywords:
    plugin: keywords_lookup
    migration: keywords
    source: keywords
    no_stub: true

  moderation_state: moderation_state

destination:
  plugin: entity:node
  default_bundle: tool

migration_dependencies:
  required:
    - civicrm_organization
    - keywords
