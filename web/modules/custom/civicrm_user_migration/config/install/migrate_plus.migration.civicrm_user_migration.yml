id: civicrm_user_migration
label: 'Drupal & CiviCRM User Migration'
migration_group: civicrmUser

source:
  plugin: civicrm_user_migration
  key: cherity

process:
  uid: uid
  name: name
  pass: pass
  mail: mail
  status: status
  created: created
  changed: changed
  init: mail
  _skip_admin:
    plugin: skip_on_value
    source: uid
    value: 1
    method: row

  roles:
    - plugin: skip_on_empty
      method: process
      source: roles

    - plugin: explode
      delimiter: ','

  # Custom user fields
  field_civicrm_contact_id: civicrm_contact_id
  field_do_not_email: do_not_email
  field_no_marketing_emails: is_opt_out 
  field_first_name: first_name
  field_last_name: last_name
  field_job_title: job_title

  # Gender
  field_gender: gender_id

  # user_picture:
  #   plugin: default_value
  #   default_value:
  #     - target_id: 3705
  #       alt: test
  #       title: test
  user_picture/target_id: user_picture_fid

  # Mentor fields
  field_are_you_interested_in_ment: willing_to_be_a_mentor__90
  field_identify_topics_in_which_y: description_96

  field_allow_direct_messaging/value:
    plugin: default_value
    default_value: 1

  # Demographics
  field_pronouns: what_are_your_preferred_pronouns_57

 
  
  field_spoken_language:
    - plugin: skip_on_empty
      method: process
      source: spoken_language_labels
      
  # Biography
  field_professional_summary: biography_19

  # Address
  field_country:
    plugin: callback
    source: country_code
    callable: strtoupper

  field_state_province:
    - plugin: skip_on_empty
      method: process
      source: country_code
    - plugin: callback
      source: state
      callable: strtoupper

  field_academic_field_of_study: academic_field_of_study_133 
  field_academic_institution: academic_institutions_134
  field_roles: 
    - plugin: skip_on_empty
      method: process
      source: roles_132
    - plugin: civi_explode


  field_degree: highest_level_of_education_degre_62

  # Social Media.
  field_google_scholar_link: google_scholar
  field_instagram_profile: instagram
  field_linkedin_profile_url: linkedin
  field_orcid_id_link: orchid_link
  field_website_url: website
  field_wechat_link: wechat

  # Notifications
  field_content_moderation_notifi:
    plugin: static_map
    source: content_moderation_notifications_125
    map:
      enabled: 1
      disabled: 0
    default_value: 0

  field_comment_notifications:
    plugin: static_map
    source: comment_notifications_126
    map:
      enabled: 1
      disabled: 0
    default_value: 0


  field_forum_notifications:
    - plugin: static_map
      source: forum_notifications_127
      map:
        enabled: 1
        disabled: 0
      default_value: 0

  field_group_content_notification:
    - plugin: static_map
      source: group_content_notifications_128
      map:
        enabled: 1
        disabled: 0
      default_value: 0

  field_email_digest:
    - plugin: static_map
      source: email_digest_129
      map:
        enabled: 1
        disabled: 0
      default_value: 0

  # Field of Interest.
  field_specify_other_interest: other_field_of_interest_131
  field_other_fields_of_expertise: other_fields_of_expertise_140
  field_field_of_interest:
    plugin: civi_multi_field_of_interest
    sources:
      - field_of_interest
    custom_field_map:
      field_of_interest: 130

  field_field_of_expertise:
    plugin: civi_multi_field_of_interest
    sources:
      - fields_of_expertise
    custom_field_map:
      fields_of_expertise: 139
  
  field_profile_updated: 
    - plugin: skip_on_empty 
      method: process
      source: profile_updated_124

    - plugin: format_date
      from_format: 'Y-m-d H:i:s'
      to_format: 'Y-m-d'

  field_civi_organization_id:
    - plugin: skip_on_empty
      method: process
      source: organization_id

destination:
  plugin: entity:user
