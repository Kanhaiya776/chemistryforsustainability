    value: '<!-- Main container --><div style="background-color:#ffffff;margin:0 auto;max-width:800px;padding:20px;"><div style="color:#ffffff;display:flex;justify-content:space-between;padding:10px;text-align:center;">&nbsp;</div><!-- Banner Section with inline styles --><div style="height:300px;overflow:hidden;width:100%;"><img style="display:block;object-fit:cover;" src="https://chemistryforsustainability.org/themes/custom/skvare_custom_bootstrap/dist/images/banner-frontpage..png" alt="Banner Image" width="100%" height="100%"></div><!-- Header Section --><div style="align-items:center;border-bottom:2px solid #e0e0e0;display:flex;justify-content:space-between;margin-bottom:20px;padding-bottom:10px;"><div style="color:#1a7f5a;font-size:20px;"><p><a href="https://chemistryforsustainability.org/" target="_blank"><strong><img style="float:left;margin:5px;" src="https://chemistryforsustainability.org/sites/default/files/civicrm/persist/contribute/images/uploads/logo-initial.jpg" alt="Green chemistry for Sustainability logo" width="300" height="60"></strong></a></p></div><div style="color:#777777;font-size:14px;margin-left:10px;"><p>August 1, 2025</p></div></div><!-- Section Title and Introduction --><div style="color:#204b7d;font-size:18px;"><strong>Section Title</strong></div><div style="color:#777;font-size:15px;line-height:1.6;margin-bottom:20px;">Duis autem vel eum iriure dolor in hendrerit in vulputate velit esse molestie consequat, vel illum dolore eu feugiat nulla facilisis at vero eros et accumsan et iusto odio dignissim.</div><!-- New Funding Opportunity Section --><div style="border-top:1px solid #e0e0e0;margin:20px 0;padding:20px 0;"><div style="color:#d96c1f;padding-bottom:20px;"><strong>FEATURED USER</strong></div><div style="align-items:flex-start;display:flex;flex-wrap:wrap;gap:20px;"><div style="flex:1 1 280px;min-width:280px;"><img style="border-radius:4px;display:block;" src="https://chemistryforsustainability.org/civicrm/contact/imagefile?photo=img_0680.jpeg" alt="James Aboko" width="100%" height="100%"></div><div style="flex:1 1 280px;min-width:280px;"><div style="color:#204b7d;font-size:18px;"><strong>New Funding Opportunity</strong></div><div style="color:#777;font-size:14px;line-height:1.5;margin-top:10px;">The Herman Frasch Fund for Chemical Research is a trust created under the will of Elizabeth Blee Frasch...</div><p><a style="background-color:#d96c1f;border-radius:3px;color:#ffffff;display:inline-block;float:right;font-size:14px;margin-top:12px;padding:8px 16px;text-decoration:none;" href="https://chemistryforsustainability.org/funding-opportunity/herman-frasch-foundation-grants">READ MORE&nbsp;</a></p></div></div></div><!-- Search & Submit Funding Opportunity Section --><div style="background-color:aliceblue;padding:20px;"><p><img style="display:inline-block;padding-top:3px;" src="https://staging.chemistryforsustainability.org/sites/default/files/civicrm/persist/contribute/images/uploads/thumbnails/magnifying_glass_bb900526ce2e8c55599f6b0c61a6b5b6.png" width="15" height="15" align="left"> <a style="color:#204b7d;font-size:14px;text-decoration:none;" href="https://chemistryforsustainability.org/funding">Search All Funding Opportunities</a></p><p><img style="display:inline-block;padding-top:3px;" src="https://staging.chemistryforsustainability.org/sites/default/files/civicrm/persist/contribute/images/uploads/thumbnails/paper_airplane_84a700207cd91c1aadfb839bad01ff09.png" width="15" height="15" align="left"> &nbsp;<a style="color:#204b7d;font-size:14px;text-decoration:none;" href="https://chemistryforsustainability.org/node/add/funding_opportunity?destination=/funding&amp;redirect=/node/add/funding_opportunity">Submit a Funding Opportunity</a></p></div><!-- 10th Asia-Pacific Congress Section --><div style="border-top:2px solid #e0e0e0;color:#204b7d;font-size:18px;padding:20px 0;"><strong>10th Asia-Pacific Congress on Catalysis (APCAT-10) – Biomass Conversion and Polymer Degradation Symposium, Singapore, 4-7 Aug 2025</strong></div><div style="align-items:flex-start;display:flex;flex-wrap:wrap;gap:25px;"><!-- Image Section --><div style="flex:1 1 350px;min-width:280px;"><img style="border-radius:4px;display:block;max-width:400px;" src="https://chemistryforsustainability.org/sites/default/files/styles/wide/public/featured-image/2025-04/apcat-issac-plenaries1.jpg?itok=Ogi3LOw2" alt="Singapore Skyline" width="100%" height="100%"></div><!-- Details Section --><div style="color:#333;flex:1 1 350px;font-size:14px;line-height:1.6;min-width:280px;"><div style="color:#777;margin-bottom:15px;"><strong style="display:block;margin-bottom:5px;">Key dates:</strong> Abstract submission deadline: 20 May 2025 Notification of acceptance: 24 Jun 2025 Deadline for Early Bird Registration: 30 Jun 2025 Event date: 4-7 August 2025</div><div style="margin-bottom:20px;"><strong style="display:block;margin-bottom:5px;">Venue:</strong> Suntec Singapore Convention &amp; Exhibition Centre — We now invite abstract submissions for oral and poster presentations at the Biomass Conversion and Polymer Degradation Symposium.</div><p><a style="background-color:#c75a1b;border-radius:20px;color:#ffffff;display:inline-block;float:right;font-size:14px;padding:10px 22px;text-decoration:none;" href="https://chemistryforsustainability.org/events-calendar/10th-asia-pacific-congress-catalysis-apcat-10-biomass-conversion-and-polymer"><strong>LEARN MORE&nbsp;</strong></a></p></div></div><!-- Safer Alternative Highlight --><div style="border-top:1px solid #e0e0e0;display:flex;gap:20px;margin-top:20px;padding-top:20px;"><div style="align-items:flex-start;background-color:#ffffff;border-radius:5px;display:flex;flex-direction:column;flex:1;justify-content:space-between;padding:15px;text-align:left;"><div style="color:#d96c1f;padding-bottom:20px;"><strong>SAFER ALTERNATIVE HIGHLIGHT</strong></div><img style="border-radius:5px;max-width:100%;" src="https://chemistryforsustainability.org/sites/default/files/case-study/images/2024-09/ginkgo_0.jpg" alt="Enzyme Engineering Platform" width="100%" height="100%"><p><a style="color:#204b7d;font-size:18px;margin-bottom:10px;" href="https://chemistryforsustainability.org/safer-alternatives/enzyme-engineering-platform-ginkgo-bioworks"><strong>Enzyme Engineering Platform by Ginkgo Bioworks</strong></a></p><p style="color:#777;font-size:14px;line-height:1.5;">Ginkgo Bioworks is a platform for cell programming, offering comprehensive, end-to-end services that addresses...</p><div style="color:#777;font-size:12px;"><strong>Owner/Manufacturer/Supplier:</strong> Ginkgo Bioworks, Inc.</div><div style="color:#777;font-size:12px;"><strong>Stage of Development:</strong> System Development/Field Test/Commercialization</div><div style="color:#777;font-size:12px;"><strong>Category:</strong> Other</div></div><!-- Tool Highlight --><div style="align-items:flex-start;background-color:#ffffff;border-radius:5px;display:flex;flex-direction:column;flex:1;justify-content:space-between;padding:15px;text-align:left;"><div style="color:#d96c1f;padding-bottom:20px;"><strong>TOOL HIGHLIGHT</strong></div><img style="border-radius:5px;max-width:100%;" src="https://chemistryforsustainability.org/sites/default/files/styles/medium/public/featured-image/2024-10/nexus-blog-posts-for-social-media-600-x-300-px.png?itok=fRI0S2--" alt="Acid-Base Selection Tool" width="100%" height="100%"><p><a style="color:#204b7d;font-size:18px;margin-bottom:10px;" href="https://chemistryforsustainability.org/tools-metrics/acid-base-selection-tool"><strong>Acid-Base Selection Tool</strong></a></p><p style="color:#777;font-size:14px;line-height:1.5;">The Acid-Base Selection Tool developed by the ACS Green Chemistry Institute Pharmaceutical Roundtable aims to enable scientists across industry and academia to choose more sustainable acids and bases. The Acid-Base Tool contains over 200 acids and bases which the user can filter by parameters including pKa (in water or acetonitrile), functional groups, melting point, and boiling point.</p><div style="color:#777;font-size:12px;margin-top:10px;"><strong>Tool Owner:</strong> ACS GCI Pharmaceutical Roundtable</div></div></div><!-- FEATURED USER --><div style="border-top:1px solid #e0e0e0;margin:20px 0;padding:20px 0;"><div style="color:#d96c1f;padding-bottom:20px;"><strong>FEATURED USER</strong></div><div style="align-items:flex-start;display:flex;flex-wrap:wrap;gap:20px;"><div style="flex:1 1 280px;min-width:280px;"><img style="border-radius:4px;display:block;" src="https://chemistryforsustainability.org/civicrm/contact/imagefile?photo=aboko_james_278-0759.jpg" alt="James Aboko" width="100%" height="100%"></div><div style="flex:1 1 280px;min-width:280px;"><div style="color:#204b7d;font-size:18px;"><p style="margin:0;"><strong>James Aboko</strong></p><p style="margin:0;"><strong>Clemson University</strong></p></div><div style="color:#777;font-size:14px;line-height:1.5;margin-top:10px;">Duis autem vel eum iriure dolor in hendrerit in vulputate velit esse molestie consequat...</div><p><a style="background-color:#d96c1f;border-radius:3px;color:#ffffff;display:inline-block;float:right;font-size:14px;margin-top:12px;padding:8px 16px;text-decoration:none;" href="https://chemistryforsustainability.org/user/1128?destination=/user/1128&amp;redirect=/user/1128">READ MORE&nbsp;</a></p></div></div></div><!-- Search all User --><div style="background-color:aliceblue;padding:20px;"><p><img style="display:inline-block;padding-top:3px;" src="https://staging.chemistryforsustainability.org/sites/default/files/civicrm/persist/contribute/images/uploads/thumbnails/magnifying_glass_bb900526ce2e8c55599f6b0c61a6b5b6.png" width="15" height="15" align="left">&nbsp;<a style="color:#204b7d;font-size:14px;text-decoration:none;" href="https://chemistryforsustainability.org/people-search"> Search All Users</a></p><p><img style="display:inline-block;padding-top:3px;" src="https://staging.chemistryforsustainability.org/sites/default/files/civicrm/persist/contribute/images/uploads/thumbnails/paper_airplane_84a700207cd91c1aadfb839bad01ff09.png" width="15" height="15" align="left"> &nbsp;<a style="color:#204b7d;font-size:14px;text-decoration:none;" href="https://chemistryforsustainability.org/form/user-registration?redirectPath=/people-search">Apply to be a Featured User</a></p></div><!-- Featured Organization Section --><div style="border-top:1px solid #e0e0e0;margin-top:20px;padding-top:20px;"><div style="color:#d96c1f;"><strong>FEATURED ORGANIZATION</strong></div><div style="background-color:#ffffff;border-radius:8px;display:flex;flex-wrap:wrap;margin-bottom:20px;padding:20px 0;"><div style="text-align:center;width:100%;"><img style="margin-bottom:10px;max-width:300px;" src="https://chemistryforsustainability.org/themes/custom/skvare_custom_bootstrap/images/blocks/visit_our_sister_sites/ACS-full-logo.png" alt="ACS Green Chemistry Institute" width="600" height="200"></div><div><h2 style="color:#333;font-size:1.6rem;margin-top:0;">ACS Green Chemistry Institute</h2><p style="color:#555;font-size:1rem;line-height:1.6;">The ACS Green Chemistry Institute® was founded in 1997 and was incorporated into the American Chemical Society in 2001. The mission of the ACS Green Chemistry Institute® (ACS GCI) is to catalyze the implementation of innovative approaches to chemistry and engineering that enable sustainable development across the globe...</p><p><a style="background-color:#ff6a00;border-radius:4px;color:white;display:inline-block;float:right;margin-top:10px;padding:10px 20px;text-decoration:none;" href="https://chemistryforsustainability.org/civicrm-contact/85"><strong>Read More</strong></a></p></div></div><!-- Search all Organization --><div style="background-color:aliceblue;padding:20px;"><p><img style="display:inline-block;padding-top:3px;" src="https://staging.chemistryforsustainability.org/sites/default/files/civicrm/persist/contribute/images/uploads/thumbnails/magnifying_glass_bb900526ce2e8c55599f6b0c61a6b5b6.png" width="15" height="15" align="left"> <a style="color:#204b7d;font-size:14px;text-decoration:none;" href="https://chemistryforsustainability.org/organizations">Search All Organizations</a></p><p><img style="display:inline-block;padding-top:3px;" src="https://staging.chemistryforsustainability.org/sites/default/files/civicrm/persist/contribute/images/uploads/thumbnails/paper_airplane_84a700207cd91c1aadfb839bad01ff09.png" width="15" height="15" align="left"> &nbsp;<a style="color:#204b7d;font-size:14px;text-decoration:none;" href="https://chemistryforsustainability.org/form/new-organization?destination=/search/organizations&amp;redirect=/form/new-organization">Apply to be a Featured Organization</a></p></div></div><!-- Footer Section --><div style="background-color:#003b56;color:white;padding:20px;text-align:center;"><p><a href="https://chemistryforsustainability.org/" target="_blank"><img style="margin:5px;" src="https://chemistryforsustainability.org/sites/default/files/civicrm/persist/contribute/images/uploads/logo-initial.jpg" alt="Green chemistry for Sustainability logo" width="300" height="60">&nbsp;</a></p><p style="clear:both;">Copyright © 2025, Green Chemistry for Sustainability. All rights reserved.</p></div></div>'
