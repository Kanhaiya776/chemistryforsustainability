id: update_organization_form
title: 'Update Organization Form'
description: '<p>Update existing organization details</p>'
categories: {  }
elements: |-
  individual:
    '#type': fieldset
    '#title': Individual
    '#title_display': invisible
    ids:
      '#type': textarea
      '#title': ids
      '#default_value': '[webform_submission:source-entity:id]'
  organization_extras:
    '#type': fieldset
    '#title': 'Organization Extras'
    '#title_display': invisible
    existing_contact:
      '#type': webform_contact
      '#title': 'Existing Contact'
      '#company__access': false
      '#email__access': false
      '#phone__access': false
      '#address__access': false
      '#address_2__access': false
      '#city__access': false
      '#state_province__access': false
      '#postal_code__access': false
      '#country__access': false
    add_update_organization_logo:
      '#type': managed_file
      '#title': 'Add/Update Organization Logo'
      '#file_extensions': 'jpg, jpeg, png, heif'
      '#file_name': org
      '#sanitize': true
    flexbox:
      '#type': webform_flexbox
      organization_name:
        '#type': textfield
        '#title': 'Organization Name'
        '#required': true
        '#flex': 2
        '#default_value': '[current-page:title]'
      organization_acronym:
        '#type': textfield
        '#title': 'Organization Acronym'
        '#counter_type': character
        '#counter_maximum': 255
  contact_2:
    '#type': fieldset
    '#title': 'Contact 2'
    flexbox_01:
      '#type': webform_flexbox
      country:
        '#type': address
        '#title': Country
        '#title_display': ''
        '#field_overrides':
          givenName: hidden
          additionalName: hidden
          familyName: hidden
          organization: hidden
          addressLine1: hidden
          addressLine2: hidden
          addressLine3: hidden
          postalCode: hidden
          sortingCode: hidden
          dependentLocality: hidden
          locality: hidden
      city:
        '#type': textfield
        '#title': City
    street_address:
      '#type': textfield
      '#title': ' Street Address'
    flexbox_02:
      '#type': webform_flexbox
      street_address_line_2:
        '#type': textfield
        '#title': ' Street Address Line 2'
      postal_code:
        '#type': textfield
        '#title': ' Postal Code'
    sector:
      '#type': fieldset
      '#title': Sector
      '#title_display': invisible
      flexbox_05:
        '#type': webform_flexbox
        sectoredit:
          '#type': select
          '#title': Sector
          '#options':
            academia: Academia
            'government Sector': 'Government Sector'
            industry: Industry
            non_governmental_organization: 'Non-Governmental Organization'
            other: Other
        container:
          '#type': container
          academia_sub_sector:
            '#type': webform_term_select
            '#title': 'Academia Sub-Sector'
            '#states':
              visible:
                ':input[name="sectoredit"]':
                  value: academia
            '#vocabulary': academia_sub_sector
          government_sub_sector:
            '#type': webform_term_select
            '#title': 'Government Sub-Sector'
            '#states':
              visible:
                ':input[name="sectoredit"]':
                  value: 'government Sector'
            '#vocabulary': government_sub_sector
          industry_sub_sector:
            '#type': webform_term_select
            '#title': 'Industry Sub-sector'
            '#states':
              visible:
                ':input[name="sectoredit"]':
                  value: industry
            '#vocabulary': industry_sub_sector
          if_industry_is_the_company_a_startup:
            '#type': radios
            '#title': 'If Industry, is the company a startup?'
            '#options':
              1: 'Yes'
              2: 'No'
            '#states':
              visible:
                ':input[name="sectoredit"]':
                  value: industry
    website:
      '#type': textfield
      '#title': Website
      '#required': true
      '#required_error': 'Organization website is required'
      '#pattern': '^(https?:\/\/)?(www\.)?[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(:\d+)?(\/[^\s]*)?$'
      '#pattern_error': 'Please enter a valid website URL & must start with http:// or https://.'
      '#counter_type': character
      '#counter_maximum': 255
    organization_description:
      '#type': textarea
      '#title': ' Organization Description'
      '#description': '<p>Description should be under <strong>2000 characters</strong> and contain only valid characters: A-Z, a-z, 0-9, - . , ? ! : ; " '' &amp; ® —</p>'
      '#pattern': '^[A-Za-z0-9 .,?!:;\"''&®—-]{1,2000}$'
      '#pattern_error': 'Please enter a description (max 2000 characters) using only letters, numbers, and these symbols: - . , ? ! : ; " '' & ® —'
    flexbox_03:
      '#type': webform_flexbox
      linkedin_profile:
        '#type': textfield
        '#title': 'LinkedIn Profile'
        '#placeholder': 'https://www.linkedin.com/in/your-profile-name'
        '#pattern': '^(https?:\/\/)?(www\.)?[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(:\d+)?(\/[^\s]*)?$'
        '#pattern_error': 'Please enter a valid linkedin URL & must start with http:// or https://.'
        '#counter_type': character
        '#counter_maximum': 255
      facebook_profile:
        '#type': textfield
        '#title': 'Facebook Profile'
        '#placeholder': 'Facebookhttps://www.facebook.com/your.profile.name Profile'
        '#pattern': '^(https?:\/\/)?(www\.)?[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(:\d+)?(\/[^\s]*)?$'
        '#pattern_error': 'Please enter a valid facebook URL & must start with http:// or https://.'
        '#counter_type': character
        '#counter_maximum': 255
    flexbox_04:
      '#type': webform_flexbox
      instagram_profile:
        '#type': textfield
        '#title': 'Instagram Profile'
        '#placeholder': 'https://www.instagram.com/yourusername'
        '#pattern': '^(https?:\/\/)?(www\.)?[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(:\d+)?(\/[^\s]*)?$'
        '#pattern_error': 'Please enter a valid instagram URL & must start with http:// or https://.'
      wechat_profile:
        '#type': textfield
        '#title': 'Wechat Profile'
        '#placeholder': 'https://www.wechat.com/your-id'
        '#pattern': '^(https?:\/\/)?(www\.)?[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(:\d+)?(\/[^\s]*)?$'
        '#pattern_error': 'Please enter a valid wechat URL & must start with http:// or https://.'
        '#counter_type': character
        '#counter_maximum': 255
