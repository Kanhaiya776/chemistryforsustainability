id: email_settings
title: 'Email settings'
description: '<p>Email Preferences</p>'
categories: {  }
elements: |-
  contact:
    '#type': fieldset
    '#title': Contact
    '#title_display': invisible
    email_contact:
      '#type': email
      '#title': Email
      '#readonly': true
      '#default_value': '[current-user:mail]'
    privacy_preferences:
      '#type': checkboxes
      '#title': 'Privacy Preferences'
      '#options':
        do_not_email: 'Do not email -- Opt out of all emails from this site.'
        is_opt_out: 'No marketing emails'
      '#attributes':
        class:
          - privacy-preference
    allow_direct_messaging:
      '#type': opt_in_element
      '#title': 'Allow Direct Messaging'
  site_activity_notifications:
    '#type': webform_section
    '#title': 'Site Activity Notifications'
    '#title_tag': h3
    '#states':
      invisible:
        ':input[name="privacy_preferences[do_not_email]"]':
          checked: true
    my_submitted_content:
      '#type': radios
      '#title': 'My Submitted Content'
      '#description': '<p><em>Send me updates when my submitted web content is reviewed or published.</em></p>'
      '#title_display': before
      '#description_display': before
      '#options':
        enabled: 'Yes'
        disabled: 'No'
      '#options_display': side_by_side
    forum_activity:
      '#type': radios
      '#title': 'Forum Activity'
      '#description': '<p><em>Notify me when someone replies to my forum posts.</em></p>'
      '#description_display': before
      '#options':
        enabled: 'Yes'
        disabled: 'No'
      '#options_display': side_by_side
    group_content_added:
      '#type': radios
      '#title': 'Group Content Added'
      '#description': "<p><em>Notify me when someone adds new content to a group I'm a member of</em></p>"
      '#description_display': before
      '#options':
        enabled: 'Yes'
        disabled: 'No'
      '#options_display': side_by_side
    comments:
      '#type': radios
      '#title': Comments
      '#description': "<p><em>Notify me when someone posts a comment on something I've submitted, or replies to my comments.</em></p>"
      '#description_display': before
      '#options':
        enabled: 'Yes'
        disabled: 'No'
      '#options_display': side_by_side
    email_digest:
      '#type': radios
      '#title': 'Email Digest'
      '#options':
        'No digest': 'No digest (send all my notifications immediately)'
        Daily: 'Daily digest'
  subscriptions:
    '#type': webform_section
    '#title': Subscriptions
    '#title_tag': h3
    '#states':
      invisible:
        - ':input[name="privacy_preferences[do_not_email]"]':
            checked: true
        - or
        - ':input[name="privacy_preferences[is_opt_out]"]':
            checked: true
    email_subscriptions:
      '#type': webform_entity_checkboxes
      '#title': 'Email Subscriptions'
      '#target_type': simplenews_newsletter
      '#selection_handler': 'default:simplenews_newsletter'
      '#selection_settings':
        target_bundles: null
css: "fieldset#edit-privacy-preferences--wrapper legend span {\r\n    font-size: 1.75rem;\r\n    color: var(--bs-heading-color);\r\n    font-weight: 500;\r\n    line-height: 1.2;\r\n}"
