id: new_organization
title: 'New Organization'
description: ''
categories: {  }
elements: |-
  container_02:
    '#type': container
    processed_text:
      '#type': processed_text
      '#text': '<div class="webform-required"><span style="color:red;">*</span>&nbsp;Indicates required field</div>'
      '#format': full_html
    add_update_organization_logo:
      '#type': managed_file
      '#title': 'Add/Update Organization Logo'
      '#access_create_roles': {  }
      '#access_update_roles':
        - authenticated
      '#max_filesize': '2'
      '#file_extensions': 'jpg, jpeg, png, heif'
      '#file_name': org
      '#sanitize': true
  flexbox_02:
    '#type': webform_flexbox
    organization_name:
      '#type': textfield
      '#title': ' Organization Name'
      '#required': true
      '#required_error': 'Organization name is required'
      '#pattern': '^[&,()\- a-z A-Z0-9]+$'
      '#pattern_error': 'Organization name should only contains & , - () special characters'
      '#flex': 2
    organization_acronym:
      '#type': textfield
      '#title': 'Organization Acronym'
  country_admin:
    '#type': address
    '#title': Country
    '#title_display': ''
    '#required': true
    '#default_value':
      country_code: US
      langcode: ''
      administrative_area: ''
      given_name: null
      additional_name: null
      family_name: null
      organization: null
      address_line1: null
      address_line2: null
      address_line3: null
      postal_code: null
      sorting_code: null
      dependent_locality: null
      locality: null
    '#wrapper_attributes':
      class:
        - row
        - g-3
        - address-bootstrap-row
    '#field_overrides':
      givenName: hidden
      additionalName: hidden
      familyName: hidden
      organization: hidden
      addressLine1: hidden
      addressLine2: hidden
      addressLine3: hidden
      postalCode: hidden
      sortingCode: hidden
      dependentLocality: hidden
      locality: hidden
      administrativeArea: optional
  city:
    '#type': textfield
    '#title': City
  street_address:
    '#type': textfield
    '#title': 'Street Address'
  street_address_line_2:
    '#type': textfield
    '#title': 'Street Address Line 2'
  custom_postal_code:
    '#type': textfield
    '#title': 'Postal Code'
  geographic_location:
    '#type': fieldset
    '#title': 'Geographic Location'
    '#title_display': invisible
  flexbox_add2:
    '#type': webform_flexbox
  flexbox_01:
    '#type': webform_flexbox
    sector:
      '#type': select
      '#title': Sector
      '#options':
        academia: Academia
        'government Sector': 'Government Sector'
        industry: Industry
        non_governmental_organization: 'Non-Governmental Organization'
        other: Other
      '#required': true
      '#required_error': 'Choose sector'
      '#format': raw
    container_01:
      '#type': container
      field_academia_sub_sector:
        '#type': webform_term_select
        '#title': 'Academia Sub-Sector'
        '#states':
          visible:
            ':input[name="sector"]':
              value: academia
        '#format': id
        '#vocabulary': academia_sub_sector
      field_government_sub_sector:
        '#type': webform_term_select
        '#title': 'Government Sub-Sector'
        '#states':
          visible:
            ':input[name="sector"]':
              value: 'government Sector'
        '#format': id
        '#vocabulary': government_sub_sector
      field_industry_sub_sector:
        '#type': webform_term_select
        '#title': 'Industry Sub-sector'
        '#states':
          visible:
            ':input[name="sector"]':
              value: industry
        '#format': id
        '#vocabulary': industry_sub_sector
      if_industry_is_the_company_a_startup:
        '#type': radios
        '#title': 'If Industry, is the company a startup?'
        '#options':
          1: 'Yes'
          0: 'No'
        '#states':
          visible:
            ':input[name="sector"]':
              value: industry
  flexbox_06:
    '#type': webform_flexbox
    organization_website:
      '#type': textfield
      '#title': 'Organization Website'
      '#required': true
      '#required_error': 'Organization website is required'
      '#pattern': '^https?:\/\/[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}([\/:?#[\]@!$&''()*+,;=%-].*)?$'
      '#pattern_error': 'Please enter a valid website URL & must start with http:// or https://.'
    markup:
      '#type': webform_markup
  organization_description:
    '#type': textarea
    '#title': 'Organization Description'
    '#description': '<p>Description should be under <strong>2000 characters</strong> and contain only valid characters: A-Z, a-z, 0-9, - . () , ? ! : ; " '' &amp; ® —</p>'
    '#pattern': '^[A-Za-z0-9 .,?!:;\"''()&®—-]{1,2000}$'
    '#pattern_error': 'Please enter a description (max 2000 characters) using only letters, numbers, and these symbols: - . , ? ! : ; " '' & ® —'
    '#counter_type': character
    '#counter_maximum': 2000
  add_social_media_links_for_your_organization:
    '#type': checkbox
    '#title': 'Add social media links for your organization.'
  organization_social_links:
    '#type': fieldset
    '#title': 'Organization Social Links'
    '#states':
      visible:
        ':input[name="add_social_media_links_for_your_organization"]':
          checked: true
    flexbox_04:
      '#type': webform_flexbox
      linkedin_profile:
        '#type': textfield
        '#title': 'LinkedIn Profile'
        '#placeholder': 'https://www.linkedin.com/in/your-profile-name'
        '#pattern': '^https?:\/\/[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}([\/:?#[\]@!$&''()*+,;=%-].*)?$'
        '#pattern_error': 'Please enter a valid linkedin URL & must start with http:// or https://.'
      facebook_profile:
        '#type': textfield
        '#title': 'Facebook Profile'
        '#placeholder': 'https://www.facebook.com/your.profile.name'
        '#pattern': '^https?:\/\/[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}([\/:?#[\]@!$&''()*+,;=%-].*)?$'
        '#pattern_error': 'Please enter a valid facebook URL & must start with http:// or https://.'
    flexbox_05:
      '#type': webform_flexbox
      instagram_profile:
        '#type': textfield
        '#title': 'Instagram Profile'
        '#placeholder': 'https://www.instagram.com/yourusername'
        '#pattern': '^https?:\/\/[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}([\/:?#[\]@!$&''()*+,;=%-].*)?$'
        '#pattern_error': 'Please enter a valid instagram URL & must start with http:// or https://.'
      wechat_profile:
        '#type': textfield
        '#title': 'Wechat Profile'
        '#placeholder': 'https://www.wechat.com/your-id'
        '#pattern': '^https?:\/\/[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}([\/:?#[\]@!$&''()*+,;=%-].*)?$'
        '#pattern_error': 'Please enter a valid wechat URL & must start with http:// or https://.'
  by_submitting_this_form_you_agree_that_the_organizational_inform:
    '#type': item
    '#title': 'By submitting this form, you agree that the organizational information provided on this form can be shared publicly on our website chemistryforsustainability.org.'
